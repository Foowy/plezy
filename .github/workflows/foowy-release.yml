name: Fork Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.0"
          cache: true
          pub-cache: false

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-${{ runner.arch }}-pub-v2-${{ hashFiles('pubspec.yaml', 'pubspec.lock') }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile --no-example

      - name: Configure signing
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties << EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build APK (split per ABI)
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=GIT_COMMIT=${{ github.sha }}

      - name: Clean up signing files
        if: always()
        run: rm -f android/app/upload-keystore.jks android/key.properties

      - name: Rename APKs
        run: |
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk plezy-arm64.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk plezy-arm32.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk plezy-x86_64.apk

      - name: Create rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-fork
          name: Latest fork build
          prerelease: true
          body: |
            Auto-built from commit ${{ github.sha }} on ${{ github.ref_name }}.

            | File | Architecture |
            |------|-------------|
            | `plezy-arm64.apk` | arm64-v8a — modern phones (recommended) |
            | `plezy-arm32.apk` | armeabi-v7a — older/32-bit devices |
            | `plezy-x86_64.apk` | x86_64 — emulators |
          files: |
            plezy-arm64.apk
            plezy-arm32.apk
            plezy-x86_64.apk
